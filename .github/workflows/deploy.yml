# ═══════════════════════════════════════════════════════════
#  MedLibrary — GitHub Pages Deployment
#
#  Triggers on every push to main.
#  1. Syncs manifest from article HTML files FIRST
#  2. Validates manifest consistency
#  3. Bumps service worker cache version
#  4. Deploys to GitHub Pages
#
#  Prerequisites:
#    1. Go to Settings → Pages → Source: "GitHub Actions"
#    2. That's it — this workflow handles the rest.
# ═══════════════════════════════════════════════════════════

name: Deploy MedLibrary

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate & Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Sync manifest first ─────────────────────────────
      - name: Sync manifest before deploy
        id: sync
        run: |
          echo "=== Scanning articles/ for new/updated articles ==="

          # Extract existing IDs from manifest.js
          EXISTING_IDS=$(grep -oP 'id:\s*"\K[^"]+' manifest.js | sort)
          echo "Existing manifest entries: $(echo "$EXISTING_IDS" | wc -l)"

          ADDED=0
          UPDATED=0
          SKIPPED=0

          for file in articles/*.html; do
            [ -f "$file" ] || continue

            ARTICLE_ID=$(basename "$file" .html)
            echo ""
            echo "Processing: $file (id: $ARTICLE_ID)"

            META_RAW=$(grep -oP '(?<=<script type="application/json" id="article-meta">)\s*\K[\s\S]*?(?=</script>)' "$file" 2>/dev/null)

            if [ -z "$META_RAW" ]; then
              echo "  ⚠ No <script id=\"article-meta\"> found — skipping"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            META=$(echo "$META_RAW" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            META_TITLE=$(echo "$META" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title',''))" 2>/dev/null)
            META_CATEGORY=$(echo "$META" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('category','General'))" 2>/dev/null)
            META_READTIME=$(echo "$META" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('readTime','5 min'))" 2>/dev/null)
            META_DESC=$(echo "$META" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('desc','') or d.get('description',''))" 2>/dev/null)
            META_DATE=$(echo "$META" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('date',''))" 2>/dev/null)

            META_DESC_SAFE=$(echo "$META_DESC" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/ /g')
            META_TITLE_SAFE=$(echo "$META_TITLE" | sed 's/"/\\"/g')

            if [ -z "$META_DATE" ]; then
              META_DATE=$(date +%Y-%m-%d)
            fi

            echo "  Title:    $META_TITLE"
            echo "  Category: $META_CATEGORY"
            echo "  ReadTime: $META_READTIME"
            echo "  Date:     $META_DATE"

            if echo "$EXISTING_IDS" | grep -qx "$ARTICLE_ID"; then
              echo "  → Already in manifest — checking for updates..."
              sed -i "/id: \"$ARTICLE_ID\"/,/^  },/{/^  },/d; /id: \"$ARTICLE_ID\"/d}" manifest.js

              ENTRY="  {
    id: \"$ARTICLE_ID\",
    title: \"$META_TITLE_SAFE\",
    category: \"$META_CATEGORY\",
    readTime: \"$META_READTIME\",
    desc: \"$META_DESC_SAFE\",
    file: \"articles/$ARTICLE_ID.html\",
    date: \"$META_DATE\"
  }"
              sed -i "/^];/i\\$ENTRY," manifest.js
              UPDATED=$((UPDATED + 1))
            else
              echo "  → New article — adding to manifest..."
              ENTRY="  {
    id: \"$ARTICLE_ID\",
    title: \"$META_TITLE_SAFE\",
    category: \"$META_CATEGORY\",
    readTime: \"$META_READTIME\",
    desc: \"$META_DESC_SAFE\",
    file: \"articles/$ARTICLE_ID.html\",
    date: \"$META_DATE\"
  }"
              sed -i "/^];/i\\$ENTRY," manifest.js
              ADDED=$((ADDED + 1))
            fi
          done

          # Clean up trailing commas
          python3 -c "
          import re
          with open('manifest.js', 'r') as f:
              content = f.read()
          content = re.sub(r',(\s*\n\s*\])', r'\1', content)
          with open('manifest.js', 'w') as f:
              f.write(content)
          "

          echo ""
          echo "=== Summary ==="
          echo "Added:   $ADDED"
          echo "Updated: $UPDATED"
          echo "Skipped: $SKIPPED"

          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT
          echo "has_changes=$([ $((ADDED + UPDATED)) -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Commit and push manifest
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.js
          CHANGES_COUNT=$(git diff --cached --stat manifest.js | grep manifest.js | awk '{print $1}')
          if [ -n "$CHANGES_COUNT" ]; then
            git commit -m "chore: auto-sync manifest.js (${{ steps.sync.outputs.added }} added, ${{ steps.sync.outputs.updated }} updated)"
            git push
            echo "Pushed manifest update"
          else
            echo "No actual changes to commit"
          fi

      - name: Pull latest after sync push
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git pull --rebase origin main

      # ── Validate ─────────────────────────────────────────
      - name: Validate manifest consistency
        run: |
          echo "=== Checking manifest.js vs article files ==="

          # Extract article IDs from manifest.js
          grep -oP 'id:\s*"\K[^"]+' manifest.js | sort > /tmp/manifest-ids.txt

          # Extract article filenames from articles/ directory
          ls articles/*.html 2>/dev/null | xargs -I{} basename {} .html | sort > /tmp/article-files.txt

          # Warn about manifest entries without matching article files
          MISSING_FILES=$(comm -23 /tmp/manifest-ids.txt /tmp/article-files.txt)
          if [ -n "$MISSING_FILES" ]; then
            echo "::warning::These manifest entries have no matching HTML file in articles/:"
            echo "$MISSING_FILES"
          fi

          # Warn about article files not listed in manifest
          MISSING_ENTRIES=$(comm -13 /tmp/manifest-ids.txt /tmp/article-files.txt)
          if [ -n "$MISSING_ENTRIES" ]; then
            echo "::warning::These article files have no entry in manifest.js:"
            echo "$MISSING_ENTRIES"
            echo ""
            echo "To fix: copy the manifest entry from the Article Generator tool"
            echo "and paste it into manifest.js, then push again."
          fi

          # Summary
          MANIFEST_COUNT=$(wc -l < /tmp/manifest-ids.txt)
          FILE_COUNT=$(wc -l < /tmp/article-files.txt)
          echo ""
          echo "Manifest entries: $MANIFEST_COUNT"
          echo "Article files:    $FILE_COUNT"
          echo "Validation complete."

      - name: Check service worker exists
        id: sw-check
        run: |
          if [ -f "sw.js" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::warning::sw.js not found. PWA will not have offline support."
          fi

      - name: Bump service worker cache version
        id: version
        if: steps.sw-check.outputs.found == 'true'
        run: |
          # Use short commit SHA as the cache version
          VERSION="v$(echo ${{ github.sha }} | cut -c1-8)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Replace the placeholder in sw.js
          sed -i "s/{{CACHE_VERSION}}/${VERSION}/" sw.js

          echo "Cache version set to: $VERSION"
          echo "This ensures all users receive updated content."

      - name: Upload prepared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: .
          retention-days: 1

  # ── Deploy to GitHub Pages ────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifacts
        uses: actions/download-artifact@v4
        with:
          name: site

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users will receive the updated site on their next visit." >> $GITHUB_STEP_SUMMARY
          echo "The service worker will auto-update in the background." >> $GITHUB_STEP_SUMMARY