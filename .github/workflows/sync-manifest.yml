# ===========================================================
#  MedLibrary - Auto-Update Manifest
#
#  Triggers manually (workflow_dispatch) as a standalone utility.
#  The deploy.yml workflow handles manifest sync automatically before every deploy.
#
#  You only need to:
#    1. Add your .html file to articles/
#    2. Push
#    3. This workflow does the rest.
# ===========================================================

name: Auto-Update Manifest

# Trigger: manual only (deploy workflow handles sync before deploy)
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-manifest:
    name: Sync manifest.js with articles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract article metadata and update manifest
        id: sync
        run: |
          echo "=== Scanning articles/ for new/updated articles ==="

          # Run the Python script to sync manifest
          python tools/sync-manifest.py

      - name: Verify manifest.js syntax
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          echo "=== Verifying manifest.js is valid JS ==="
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('manifest.js', 'utf8');
            // Remove the window.LIBRARY_MANIFEST = assignment and trailing semicolon
            const jsonStr = content.replace(/window\.LIBRARY_MANIFEST\s*=\s*/, '').replace(/;\s*$/, '');
            try {
              const data = JSON.parse(jsonStr);
              console.log('Valid! Found', data.length, 'articles:');
              data.forEach(a => console.log('  -', a.id, '|', a.title, '|', a.category));
            } catch (e) {
              console.error('INVALID manifest.js:', e.message);
              process.exit(1);
            }
          "

      - name: Commit and push manifest update
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.js
          CHANGES_COUNT=$(git diff --cached --stat manifest.js | grep manifest.js | awk '{print $1}')
          if [ -n "$CHANGES_COUNT" ]; then
            ADDED=${{ steps.sync.outputs.added }}
            UPDATED=${{ steps.sync.outputs.updated }}
            COMMIT_MSG="chore: auto-sync manifest.js (${ADDED} added, ${UPDATED} updated)"
            
            git commit -m "$COMMIT_MSG"
            git push
            echo "Pushed manifest update: $COMMIT_MSG"
          else
            echo "No actual changes to commit (content identical)"
          fi

      - name: Summary (no changes)
        if: steps.sync.outputs.has_changes == 'false'
        run: |
          echo "## Manifest Sync - No Changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All articles in \`articles/\` are already registered in \`manifest.js\`. Nothing to update." >> $GITHUB_STEP_SUMMARY

      - name: Summary (with changes)
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          echo "## Manifest Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Added:** ${{ steps.sync.outputs.added }} articles" >> $GITHUB_STEP_SUMMARY
          echo "- **Updated:** ${{ steps.sync.outputs.updated }} articles" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** pushed to main" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deploy workflow will now run automatically." >> $GITHUB_STEP_SUMMARY