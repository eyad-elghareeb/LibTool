<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Article Generator — MedLibrary</title>
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MedLibrary">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2330;--surface3:#222a36;--border:#30363d;--text:#e6edf3;--text-muted:#8b949e;--accent:#f0a500;--accent-dim:rgba(240,165,0,.12);--accent-glow:rgba(240,165,0,.25);--correct:#2ea043;--correct-bg:rgba(46,160,67,.12);--wrong:#da3633;--wrong-bg:rgba(218,54,51,.12);--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4);--transition:.2s ease}
[data-theme="light"]{--bg:#f3f0eb;--surface:#fff;--surface2:#f8f6f1;--surface3:#eee9e0;--border:#d0ccc5;--text:#1c1917;--text-muted:#78716c;--accent:#c27803;--accent-dim:rgba(194,120,3,.1);--accent-glow:rgba(194,120,3,.18);--shadow:0 4px 24px rgba(0,0,0,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background var(--transition),color var(--transition);min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:transparent}
.topbar{display:flex;align-items:center;gap:.75rem;padding:.65rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.topbar-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;flex:1}
.topbar-logo span{color:var(--accent)}
.icon-btn{width:36px;height:36px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all var(--transition)}
.icon-btn:hover{color:var(--text);border-color:var(--accent)}
.layout{display:flex;height:calc(100vh - 53px);overflow:hidden}
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
.panel-head{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.panel-body{flex:1;overflow-y:auto;padding:1rem}
.panel-body::-webkit-scrollbar{width:5px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
textarea{width:100%;height:100%;min-height:300px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Courier New',monospace;font-size:.85rem;line-height:1.6;padding:1rem;resize:none;outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.btn{padding:.65rem 1.25rem;border-radius:8px;font-size:.88rem;font-weight:600;transition:all var(--transition);display:inline-flex;align-items:center;gap:.4rem}
.btn-primary{background:var(--accent);color:#000;border:1px solid var(--accent)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.actions{padding:1rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-wrap:wrap;flex-shrink:0}
.error-msg{background:var(--wrong-bg);color:var(--wrong);padding:.75rem 1rem;border-radius:8px;border:1px solid var(--wrong);font-size:.85rem;margin-bottom:.75rem;display:none;animation:fadeIn .3s ease}
.error-msg.show{display:block}
.success-msg{background:var(--correct-bg);color:var(--correct);padding:.75rem 1rem;border-radius:8px;border:1px solid var(--correct);font-size:.85rem;margin-bottom:.75rem;display:none;animation:fadeIn .3s ease}
.success-msg.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.manifest-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-family:'Courier New',monospace;font-size:.78rem;line-height:1.5;color:var(--text-muted);margin-top:.75rem;word-break:break-all;white-space:pre-wrap;display:none}
.manifest-box.show{display:block}
.copy-btn{font-size:.75rem;padding:.3rem .6rem;border-radius:4px;background:var(--accent-dim);color:var(--accent);border:1px solid transparent;transition:all var(--transition);margin-top:.5rem}
.copy-btn:hover{border-color:var(--accent)}
.preview-frame{border:none;width:100%;height:100%;background:var(--bg)}
@media(max-width:768px){.layout{flex-direction:column}.panel{min-height:45vh;border-right:none;border-bottom:1px solid var(--border)}.panel:last-child{border-bottom:none}}
</style>
</head>
<body>
<div class="topbar">
  <a href="../index.html" style="display:flex;align-items:center;gap:.4rem;color:var(--text-muted);font-size:.85rem;margin-right:.5rem;transition:color var(--transition)" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="topbar-logo">🤖 AI Article <span>Generator</span></div>
  <button class="icon-btn theme-toggle-btn" onclick="toggleTheme()">☀</button>
</div>

<div class="layout">
  <div class="panel">
    <div class="panel-head">
      JSON Input
      <span style="font-weight:400;text-transform:none;letter-spacing:0">Paste AI output here</span>
    </div>
    <div class="panel-body">
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>
      <textarea id="json-input" placeholder='{
  "id": "my-article",
  "title": "Article Title",
  "category": "Cardiology",
  "readTime": "5 min",
  "description": "Brief description...",
  "sections": [
    {
      "id": "overview",
      "title": "Overview",
      "content": "<p class=\"article-p\">Text here...</p>"
    }
  ]
}'></textarea>
      <div style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;line-height:1.4">
        💡 <strong>Tip:</strong> If AI output has unescaped quotes (like <code style="color:var(--accent)">class="x"</code>), this tool will auto-fix them. For best results, the ARTICLESPEC prompt should tell the AI to escape all quotes as <code style="color:var(--accent)">class=\"x\"</code>.
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="generate()">Generate &amp; Download</button>
      <button class="btn btn-secondary" onclick="previewArticle()">Preview</button>
    </div>
    <div class="manifest-box" id="manifest-box"></div>
    <div style="padding:0 1rem 1rem;display:none" id="manifest-actions">
      <button class="copy-btn" onclick="copyManifest()">Copy manifest entry</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head">Preview</div>
    <div class="panel-body" style="padding:0">
      <iframe class="preview-frame" id="preview-frame"></iframe>
    </div>
  </div>
</div>

<script>
/* ═══ Theme ═══ */
function applyTheme(){const t=localStorage.getItem('medlib-theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.querySelectorAll('.theme-toggle-btn').forEach(b=>b.textContent=t==='dark'?'☀':'☾')}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('medlib-theme',n);applyTheme()}
applyTheme();

/* ── Service Worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('../sw.js').catch(() => {});
  });
}

let lastGeneratedHTML = '';
let lastManifestEntry = '';

function showError(msg){const el=document.getElementById('error-msg');el.textContent=msg;el.classList.add('show');document.getElementById('success-msg').classList.remove('show')}
function showSuccess(msg){const el=document.getElementById('success-msg');el.textContent=msg;el.classList.add('show');document.getElementById('error-msg').classList.remove('show')}
function hideMessages(){document.getElementById('error-msg').classList.remove('show');document.getElementById('success-msg').classList.remove('show')}

/* ═══ Auto-fix common JSON issues ═══ */
function tryAutoFixJSON(raw){
  let fixed = raw;
  let warnings = [];

  // Step 1: Remove markdown code fencing
  fixed = fixed.replace(/^```json\s*/i, '').replace(/^```\s*/gm, '').replace(/```\s*$/gm, '');
  fixed = fixed.trim();

  // Step 2: Try parsing as-is first
  try { return { data: JSON.parse(fixed), warnings: [] }; } catch(e) {}

  // Step 3: General fix for unescaped quotes in ALL string values
  fixed = fixJsonQuotes(fixed);
  if (fixed !== raw) warnings.push('Auto-fixed unescaped quotes');

  // Step 4: Remove trailing commas before } or ]
  const noTrailingCommas = fixed.replace(/,\s*([}\]])/g, '$1');
  if (noTrailingCommas !== fixed) {
    fixed = noTrailingCommas;
    warnings.push('Removed trailing commas');
  }

  // Step 5: Try parsing again
  try { return { data: JSON.parse(fixed), warnings }; } catch(e2) {
    return { error: e2.message };
  }
}

function fixJsonQuotes(str) {
  // Iteratively find and fix unescaped quotes
  // Firefox reports "line X column Y", Chrome reports "position N"
  let result = str;
  let maxIterations = 2000;
  
  for (let iter = 0; iter < maxIterations; iter++) {
    try {
      JSON.parse(result);
      return result;
    } catch (e) {
      const msg = e.message;
      let fixPos = -1;
      
      // Try Firefox format: "line X column Y"
      const lineCol = msg.match(/line (\d+) column (\d+)/);
      if (lineCol) {
        const lines = result.split('\n');
        const lineNum = parseInt(lineCol[1]);
        const colNum = parseInt(lineCol[2]);
        if (lineNum <= lines.length) {
          // Find the quote at or before the error column
          const lineIdx = lineNum - 1;
          let col = Math.min(colNum - 1, lines[lineIdx].length - 1);
          // Walk back to find the quote
          while (col >= 0 && lines[lineIdx][col] !== '"') col--;
          if (col >= 0) {
            // Calculate absolute position
            fixPos = lines.slice(0, lineIdx).join('\n').length + (lineIdx > 0 ? 1 : 0) + col;
          }
        }
      }
      
      // Try Chrome format: "position N"  
      if (fixPos === -1) {
        const posMatch = msg.match(/position (\d+)/);
        if (posMatch) {
          fixPos = parseInt(posMatch[1]) - 1;
        }
      }
      
      if (fixPos === -1 || fixPos >= result.length) return result;
      
      // Check if this position is actually a quote
      if (result[fixPos] !== '"') {
        // Walk back to find the quote
        let p = fixPos;
        while (p >= 0 && result[p] !== '"') p--;
        if (p >= 0) fixPos = p;
        else return result;
      }
      
      // Check if it's already escaped
      if (fixPos > 0 && result[fixPos - 1] === '\\') return result;
      
      // Escape this quote
      result = result.substring(0, fixPos) + '\\"' + result.substring(fixPos + 1);
    }
  }
  
  return result;
}

/* ═══ Parse & Validate ═══ */
function parseInput(){
  const raw = document.getElementById('json-input').value.trim();
  if(!raw){showError('Please paste JSON content.');return null}

  // Debug: show first 200 chars
  console.log('Input starts with:', raw.substring(0, 200));

  let result;
  try {
    result = tryAutoFixJSON(raw);
  } catch(e) {
    showError('Error parsing JSON: '+e.message);
    return null;
  }

  if(result.error){
    // Show helpful context
    const errLine = result.error.match(/line (\d+) column (\d+)/);
    let context = '';
    if (errLine) {
      const lines = raw.split('\n');
      const lineNum = parseInt(errLine[1]);
      const colNum = parseInt(errLine[2]);
      if (lineNum <= lines.length) {
        const line = lines[lineNum - 1];
        const start = Math.max(0, colNum - 40);
        const snippet = line.substring(start, start + 80);
        context = '\n\nContext (line ' + lineNum + '):\n...' + snippet + '\n';
      }
    }
    showError('Invalid JSON: '+result.error + context + '\nTip: Make sure all quotes inside HTML content are escaped. Use \" instead of "');
    return null;
  }

  if(result.warnings && result.warnings.length > 0){
    showSuccess('JSON auto-fixed: ' + result.warnings.join(', '));
  } else {
    hideMessages();
  }

  const data = result.data;
  if(!data.id||!data.title||!data.sections||!Array.isArray(data.sections)||!data.sections.length){
    showError('Missing required fields: id, title, sections (non-empty array).');return null}
  for(let i=0;i<data.sections.length;i++){
    const s=data.sections[i];
    if(!s.id||!s.title||!s.content){showError('Section '+(i+1)+' missing id, title, or content.');return null}
    s.id = s.id.replace(/[^a-zA-Z0-9_-]/g,'-').toLowerCase();
  }
  data.id = data.id.replace(/[^a-zA-Z0-9_-]/g,'-').toLowerCase();

  if(result.warnings && result.warnings.length > 0){
    showSuccess('JSON auto-fixed: ' + result.warnings.join(', '));
  } else {
    hideMessages();
  }
  return data;
}

/* ═══ Build HTML ═══ */
function buildArticleHTML(data){
  const sectionsHTML = data.sections.map(s => `
        <section class="article-section" id="${s.id}" style="animation-delay:${(data.sections.indexOf(s) * 0.05 + 0.05)}s">
          <button class="section-link-btn" onclick="copySectionLink('${s.id}')" title="Copy section link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <h2 class="article-h2">${escHTML(s.title)}</h2>
          ${s.content}
        </section>`).join('\n');

  return `<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escHTML(data.title)} - MedLibrary</title>
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MedLibrary">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/article-style.css">
<script type="application/json" id="article-meta">
 ${JSON.stringify(data)}
<\/script>
</head>
<body>
<div class="reading-progress"></div>
<div class="copy-toast"></div>
<button class="back-to-top" title="Back to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
</button>
<div class="toc-overlay"></div>
<button class="toc-mobile-toggle">
  <span class="toc-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span> Contents
</button>
<div class="article-page">
  <div class="article-topbar">
    <button class="back-btn" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Library
    </button>
    <div class="article-topbar-info">
      <span class="article-cat-badge">${escHTML(data.category||'General')}</span>
      <span class="article-read-badge">⏱ ${escHTML(data.readTime||'5 min')}</span>
    </div>
    <div class="topbar-actions">
      <div class="font-controls">
        <button class="font-btn" data-scale="0.85" title="Smaller text (A-)">A-</button>
        <button class="font-btn" data-scale="1" title="Default text (A)">A</button>
        <button class="font-btn" data-scale="1.15" title="Larger text (A+)">A+</button>
      </div>
      <button class="icon-btn bookmark-btn" onclick="toggleBookmark()" title="Bookmark this article">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="icon-btn" onclick="exportPDF()" title="Export as PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </button>
      <button class="icon-btn theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme (T)">☀</button>
    </div>
  </div>
  <div class="article-body">
    <nav class="toc-sidebar"><h3 class="toc-heading">Contents</h3><div class="toc-list" id="toc-list"></div></nav>
    <main class="article-content" id="article-content">
      <div class="article-content-inner" id="pdf-target">
        <div class="article-header-block">
          <h1 class="article-h1">${escHTML(data.title)}</h1>
          <p class="article-desc">${escHTML(data.description||'')}</p>
        </div>
 ${sectionsHTML}
      </div>
    </main>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>
<script src="../lib/article-script.js"><\/script>
</body>
</html>`;
}

function escHTML(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ═══ Build manifest entry ═══ */
function buildManifestEntry(data){
  const today = new Date().toISOString().slice(0,10);
  return `  {
    id: "${data.id}",
    title: "${data.title.replace(/"/g,'\\"')}",
    category: "${(data.category||'General').replace(/"/g,'\\"')}",
    readTime: "${data.readTime||'5 min'}",
    desc: "${(data.description||'').replace(/"/g,'\\"').replace(/\n/g,' ')}",
    file: "articles/${data.id}.html",
    date: "${today}"
  }`;
}

/* ═══ Generate ═══ */
function generate(){
  const data = parseInput();
  if(!data) return;
  const html = buildArticleHTML(data);
  lastGeneratedHTML = html;
  lastManifestEntry = buildManifestEntry(data);

  const blob = new Blob([html],{type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = data.id + '.html'; a.click();
  URL.revokeObjectURL(url);

  document.getElementById('manifest-box').textContent = lastManifestEntry;
  document.getElementById('manifest-box').classList.add('show');
  document.getElementById('manifest-actions').style.display = 'block';
  showSuccess('HTML downloaded! Copy the manifest entry below into manifest.js');
  previewArticle();
}

/* ═══ Preview ═══ */
function previewArticle(){
  const data = parseInput();
  if(!data) return;
  const html = buildArticleHTML(data);
  lastGeneratedHTML = html;
  lastManifestEntry = buildManifestEntry(data);
  document.getElementById('preview-frame').srcdoc = html;
}

/* ═══ Copy Manifest ═══ */
function copyManifest(){
  if(!lastManifestEntry) return;
  navigator.clipboard.writeText(lastManifestEntry).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(()=>{btn.textContent='Copy manifest entry'},1500);
  });
}
</script>
</body>
</html>
